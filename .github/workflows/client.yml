name: Client CI - PR

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Test & Lint 🧪
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint
